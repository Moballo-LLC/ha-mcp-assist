name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements_test.txt

      - name: Static validation
        run: scripts/verify_local.sh --static

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements_test.txt

      - name: Run full pytest suite
        run: scripts/verify_local.sh --pytest

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results
          path: test-results/pytest.xml
          if-no-files-found: warn
