name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package and publish"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Validate release version
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          version = tag.removeprefix("v")
          manifest = json.loads(
              Path("custom_components/mcp_assist/manifest.json").read_text(encoding="utf-8")
          )

          if tag == version:
              raise SystemExit(f"Release tag {tag!r} must start with 'v'")
          if manifest["version"] != version:
              raise SystemExit(
                  f"Release tag {tag!r} does not match manifest version {manifest['version']!r}"
              )
          PY

      - name: Build HACS package
        run: |
          mkdir -p dist
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          component = Path("custom_components/mcp_assist")
          archive = Path("dist/mcp_assist.zip")

          with ZipFile(archive, "w", ZIP_DEFLATED) as zip_file:
              for path in sorted(component.rglob("*")):
                  if (
                      path.is_file()
                      and "__pycache__" not in path.parts
                      and path.suffix not in {".pyc", ".pyo"}
                  ):
                      zip_file.write(path, path.relative_to("custom_components"))
          PY
          unzip -t dist/mcp_assist.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/mcp_assist.zip
