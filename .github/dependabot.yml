version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "03:30"
      timezone: "America/Los_Angeles"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      ha-test-harness:
        applies-to: "version-updates"
        patterns:
          - "pytest-homeassistant-custom-component"
          - "voluptuous-openapi"
          - "hassil"
          - "home-assistant-intents"
        update-types:
          - "minor"
          - "patch"
      python-minor-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
        exclude-patterns:
          - "pytest-homeassistant-custom-component"
          - "voluptuous-openapi"
          - "hassil"
          - "home-assistant-intents"
        update-types:
          - "minor"
      python-patch-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
        exclude-patterns:
          - "pytest-homeassistant-custom-component"
          - "voluptuous-openapi"
          - "hassil"
          - "home-assistant-intents"
        update-types:
          - "patch"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "03:45"
      timezone: "America/Los_Angeles"
    groups:
      actions-minor-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
      actions-patch-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "patch"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
