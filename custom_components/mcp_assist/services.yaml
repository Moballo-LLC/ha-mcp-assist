reload_external_custom_tools:
  name: Reload external custom tools
  description: Reload external tool packages from the Home Assistant config directory and return diagnostics.

validate_external_custom_tools:
  name: Validate external custom tools
  description: Validate external tool packages from the Home Assistant config directory without changing the live tool registry.

get_chat_logs:
  name: Get chat logs
  description: Return recent opt-in conversation logs captured by Chat Log Mode.
  fields:
    limit:
      name: Limit
      description: Maximum number of newest logs to return.
      selector:
        number:
          min: 1
          max: 100
          mode: box
    profile_entry_id:
      name: Profile entry ID
      description: Only return logs for this MCP Assist profile entry.
      selector:
        text:
    conversation_id:
      name: Conversation ID
      description: Only return logs for this Home Assistant conversation ID.
      selector:
        text:
    compact:
      name: Compact response
      description: Return tool-call metadata without arguments, raw results, or model-facing tool content. Ignored when Projection is set.
      default: false
      selector:
        boolean:
    projection:
      name: Projection
      description: Choose whether each tool includes both result forms, only raw results, only model-facing content, or metadata only.
      selector:
        select:
          mode: dropdown
          options:
            - label: Full
              value: full
            - label: Compact
              value: compact
            - label: Raw results
              value: raw
            - label: Model-facing content
              value: model

clear_chat_logs:
  name: Clear chat logs
  description: Delete opt-in conversation logs captured by Chat Log Mode.
  fields:
    profile_entry_id:
      name: Profile entry ID
      description: Only clear logs for this MCP Assist profile entry.
      selector:
        text:
    conversation_id:
      name: Conversation ID
      description: Only clear logs for this Home Assistant conversation ID.
      selector:
        text:
